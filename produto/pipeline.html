<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Comercial · Agente Comercial IA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e27;--bg2:#0f1438;--card:#151b3d;--card2:#1a2147;
    --text:#e8ecff;--muted:#9aa3c7;--line:#1f2752;
    --accent:#6366f1;--accent2:#8b5cf6;
    --green:#10b981;--gold:#fbbf24;--red:#ef4444;--blue:#3b82f6;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select,textarea{font-family:inherit;background:var(--bg2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}

  /* TOPBAR */
  .topbar{background:rgba(10,14,39,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
  .logo{font-weight:800;font-size:16px;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .actions{display:flex;gap:8px}
  .btn{padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
  .btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent)}

  /* STATS */
  .stats{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;max-width:1600px;margin:0 auto}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .stat-val{font-size:22px;font-weight:800}
  .stat-val.green{color:var(--green)}.stat-val.gold{color:var(--gold)}.stat-val.blue{color:#a5b4fc}.stat-val.red{color:var(--red)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

  /* TOOLBAR */
  .toolbar{padding:8px 24px 16px;display:flex;gap:10px;align-items:center;max-width:1600px;margin:0 auto;flex-wrap:wrap}
  .toolbar input{max-width:280px}

  /* BOARD */
  .board{padding:0 24px 40px;display:grid;grid-template-columns:repeat(6,minmax(260px,1fr));gap:12px;overflow-x:auto;max-width:1600px;margin:0 auto}
  @media(max-width:1280px){.board{grid-template-columns:repeat(6,260px);max-width:none}}
  .col{background:rgba(21,27,61,.5);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:400px;display:flex;flex-direction:column;gap:8px}
  .col-header{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 10px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
  .col-dot{width:8px;height:8px;border-radius:50%}
  .col-count{background:var(--card);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
  .col-total{font-size:11px;color:var(--muted);font-weight:600}
  .col-add{background:transparent;color:var(--muted);font-size:12px;padding:8px;border-radius:6px;text-align:center;border:1px dashed var(--line);transition:.2s}
  .col-add:hover{color:var(--accent);border-color:var(--accent)}
  .col.drag-over{background:rgba(99,102,241,.08);border-color:var(--accent)}

  /* CARD */
  .lead-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px;cursor:grab;transition:.15s;position:relative}
  .lead-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .lead-card.dragging{opacity:.4}
  .lead-name{font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3}
  .lead-empresa{font-size:11px;color:var(--muted);margin-bottom:8px}
  .lead-valor{font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px}
  .lead-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}
  .lead-tag{background:rgba(99,102,241,.15);color:#a5b4fc;padding:2px 6px;border-radius:4px;font-weight:600}
  .lead-tag.hot{background:rgba(239,68,68,.15);color:#fca5a5}
  .lead-tag.warm{background:rgba(251,191,36,.15);color:#fde68a}
  .lead-tag.cold{background:rgba(99,102,241,.15);color:#a5b4fc}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:18px;margin-bottom:16px;font-weight:700}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .btn-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.25)}

  /* TOAST */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--green);color:var(--green);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;display:none;animation:slideIn .3s}
  .toast.show{display:block}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* EMPTY */
  .empty{text-align:center;padding:24px 8px;color:var(--muted);font-size:12px;font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⚡ Pipeline Comercial</div>
  <div class="actions">
    <button class="btn btn-ghost" onclick="exportarCSV()">⬇ Exportar CSV</button>
    <button class="btn btn-ghost" onclick="abrirImport()">⬆ Importar</button>
    <button class="btn btn-primary" onclick="abrirModal()">+ Novo lead</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="toolbar">
  <input type="search" id="busca" placeholder="🔍 Buscar por nome, empresa ou tag..." oninput="renderBoard()">
  <select id="filtroTag" onchange="renderBoard()" style="max-width:160px">
    <option value="">Todas as temperaturas</option>
    <option value="hot">🔥 Quente</option>
    <option value="warm">🌤️ Morno</option>
    <option value="cold">❄️ Frio</option>
  </select>
  <button class="btn btn-ghost" onclick="if(confirm('Apagar TODOS os leads? Esta ação não pode ser desfeita.')){limparTudo()}">🗑 Limpar tudo</button>
</div>

<div class="board" id="board"></div>

<!-- MODAL NOVO/EDITAR -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitulo">Novo lead</h3>
    <div class="field"><label>Nome do contato *</label><input id="f-nome" required></div>
    <div class="field"><label>Empresa</label><input id="f-empresa"></div>
    <div class="field-row">
      <div class="field"><label>Valor (R$)</label><input id="f-valor" type="number" step="0.01" min="0"></div>
      <div class="field"><label>Temperatura</label>
        <select id="f-tag">
          <option value="cold">❄️ Frio</option>
          <option value="warm">🌤️ Morno</option>
          <option value="hot">🔥 Quente</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>WhatsApp</label><input id="f-whatsapp" placeholder="(11) 99999-9999"></div>
      <div class="field"><label>Email</label><input id="f-email" type="email"></div>
    </div>
    <div class="field"><label>Etapa</label>
      <select id="f-etapa"></select>
    </div>
    <div class="field"><label>Observações</label><textarea id="f-obs" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-excluir" onclick="excluirLead()" style="display:none">Excluir</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarLead()">Salvar</button>
    </div>
  </div>
</div>

<!-- IMPORT CSV -->
<input type="file" id="fileImport" accept=".csv" style="display:none" onchange="importarCSV(event)">

<div class="toast" id="toast"></div>

<script>
const ETAPAS = [
  {id:'lead', nome:'Lead', cor:'#9aa3c7'},
  {id:'qualif', nome:'Qualificado', cor:'#3b82f6'},
  {id:'reuniao', nome:'Reunião', cor:'#8b5cf6'},
  {id:'proposta', nome:'Proposta', cor:'#fbbf24'},
  {id:'negociacao', nome:'Negociação', cor:'#f97316'},
  {id:'fechado', nome:'Fechado ✅', cor:'#10b981'},
];

let leads = JSON.parse(localStorage.getItem('pipeline_leads') || '[]');
let editandoId = null;
let dragId = null;

function salvar(){ localStorage.setItem('pipeline_leads', JSON.stringify(leads)); }
function uid(){ return 'l'+Date.now()+Math.random().toString(36).slice(2,7); }
function fmt(v){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderStats(){
  const total = leads.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const ativos = leads.filter(l=>l.etapa!=='fechado');
  const ativoVal = ativos.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const fechados = leads.filter(l=>l.etapa==='fechado');
  const fechadoVal = fechados.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
  const taxa = leads.length ? Math.round(fechados.length/leads.length*100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Pipeline ativo</div><div class="stat-val blue">${fmt(ativoVal)}</div><div class="stat-sub">${ativos.length} oportunidades</div></div>
    <div class="stat"><div class="stat-label">Fechado</div><div class="stat-val green">${fmt(fechadoVal)}</div><div class="stat-sub">${fechados.length} venda${fechados.length===1?'':'s'}</div></div>
    <div class="stat"><div class="stat-label">Total geral</div><div class="stat-val">${fmt(total)}</div><div class="stat-sub">${leads.length} leads</div></div>
    <div class="stat"><div class="stat-label">Taxa de conversão</div><div class="stat-val gold">${taxa}%</div><div class="stat-sub">fechados / total</div></div>
  `;
}

function renderBoard(){
  const busca = document.getElementById('busca').value.toLowerCase();
  const filtroTag = document.getElementById('filtroTag').value;
  const board = document.getElementById('board');
  board.innerHTML = '';
  ETAPAS.forEach(e=>{
    const lista = leads.filter(l=>{
      if(l.etapa!==e.id) return false;
      if(filtroTag && l.tag!==filtroTag) return false;
      if(busca){
        const txt = (l.nome+' '+l.empresa+' '+(l.obs||'')).toLowerCase();
        if(!txt.includes(busca)) return false;
      }
      return true;
    });
    const valTotal = lista.reduce((s,l)=>s+(parseFloat(l.valor)||0),0);
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.etapa = e.id;
    col.innerHTML = `
      <div class="col-header">
        <div class="col-title"><span class="col-dot" style="background:${e.cor}"></span>${e.nome} <span class="col-count">${lista.length}</span></div>
        <div class="col-total">${fmt(valTotal)}</div>
      </div>
    `;
    lista.forEach(l=>{
      const c = document.createElement('div');
      c.className = 'lead-card';
      c.draggable = true;
      c.dataset.id = l.id;
      const tagLabel = l.tag==='hot'?'🔥 Quente':l.tag==='warm'?'🌤️ Morno':'❄️ Frio';
      c.innerHTML = `
        <div class="lead-name">${escapeHtml(l.nome||'(sem nome)')}</div>
        ${l.empresa?`<div class="lead-empresa">${escapeHtml(l.empresa)}</div>`:''}
        ${l.valor?`<div class="lead-valor">${fmt(l.valor)}</div>`:''}
        <div class="lead-meta">
          <span class="lead-tag ${l.tag||'cold'}">${tagLabel}</span>
          <span>${formatData(l.criado)}</span>
        </div>
      `;
      c.onclick = ()=>abrirModal(l.id);
      c.ondragstart = (ev)=>{ dragId = l.id; c.classList.add('dragging'); ev.dataTransfer.effectAllowed='move'; };
      c.ondragend = ()=>c.classList.remove('dragging');
      col.appendChild(c);
    });
    if(lista.length===0){
      const e2 = document.createElement('div');
      e2.className = 'empty';
      e2.textContent = 'Sem leads aqui';
      col.appendChild(e2);
    }
    const addBtn = document.createElement('button');
    addBtn.className = 'col-add';
    addBtn.textContent = '+ adicionar';
    addBtn.onclick = ()=>abrirModal(null, e.id);
    col.appendChild(addBtn);
    col.ondragover = (ev)=>{ ev.preventDefault(); col.classList.add('drag-over'); };
    col.ondragleave = ()=>col.classList.remove('drag-over');
    col.ondrop = (ev)=>{
      ev.preventDefault();
      col.classList.remove('drag-over');
      if(!dragId) return;
      const l = leads.find(x=>x.id===dragId);
      if(l && l.etapa!==e.id){
        l.etapa = e.id;
        l.atualizado = new Date().toISOString();
        salvar(); renderAll();
        toast('Lead movido pra ' + e.nome);
      }
      dragId = null;
    };
    board.appendChild(col);
  });
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatData(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const dias = Math.floor((Date.now()-d)/86400000);
  if(dias===0) return 'hoje';
  if(dias===1) return 'ontem';
  if(dias<30) return dias+'d';
  return d.toLocaleDateString('pt-BR');
}

function abrirModal(id, etapaPadrao){
  editandoId = id;
  const etapaSelect = document.getElementById('f-etapa');
  etapaSelect.innerHTML = ETAPAS.map(e=>`<option value="${e.id}">${e.nome}</option>`).join('');
  if(id){
    const l = leads.find(x=>x.id===id);
    document.getElementById('modalTitulo').textContent = 'Editar lead';
    document.getElementById('btn-excluir').style.display = 'inline-flex';
    document.getElementById('f-nome').value = l.nome||'';
    document.getElementById('f-empresa').value = l.empresa||'';
    document.getElementById('f-valor').value = l.valor||'';
    document.getElementById('f-tag').value = l.tag||'cold';
    document.getElementById('f-whatsapp').value = l.whatsapp||'';
    document.getElementById('f-email').value = l.email||'';
    document.getElementById('f-etapa').value = l.etapa||'lead';
    document.getElementById('f-obs').value = l.obs||'';
  }else{
    document.getElementById('modalTitulo').textContent = 'Novo lead';
    document.getElementById('btn-excluir').style.display = 'none';
    ['f-nome','f-empresa','f-valor','f-whatsapp','f-email','f-obs'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-tag').value = 'cold';
    document.getElementById('f-etapa').value = etapaPadrao || 'lead';
  }
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('f-nome').focus(), 50);
}

function fecharModal(){ document.getElementById('modalBg').classList.remove('open'); editandoId=null; }

function salvarLead(){
  const nome = document.getElementById('f-nome').value.trim();
  if(!nome){ alert('Nome é obrigatório'); return; }
  const dados = {
    nome, empresa: document.getElementById('f-empresa').value.trim(),
    valor: parseFloat(document.getElementById('f-valor').value)||0,
    tag: document.getElementById('f-tag').value,
    whatsapp: document.getElementById('f-whatsapp').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    etapa: document.getElementById('f-etapa').value,
    obs: document.getElementById('f-obs').value.trim(),
    atualizado: new Date().toISOString()
  };
  if(editandoId){
    Object.assign(leads.find(l=>l.id===editandoId), dados);
    toast('Lead atualizado');
  }else{
    dados.id = uid();
    dados.criado = new Date().toISOString();
    leads.push(dados);
    toast('Lead criado');
  }
  salvar(); renderAll(); fecharModal();
}

function excluirLead(){
  if(!editandoId) return;
  if(!confirm('Excluir este lead?')) return;
  leads = leads.filter(l=>l.id!==editandoId);
  salvar(); renderAll(); fecharModal();
  toast('Lead excluído');
}

function limparTudo(){
  leads = []; salvar(); renderAll(); toast('Pipeline limpo');
}

function exportarCSV(){
  if(!leads.length){ alert('Não há leads pra exportar'); return; }
  const cabec = ['nome','empresa','valor','tag','etapa','whatsapp','email','obs','criado','atualizado'];
  const linhas = leads.map(l=>cabec.map(c=>`"${String(l[c]||'').replace(/"/g,'""')}"`).join(','));
  const csv = cabec.join(',')+'\n'+linhas.join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pipeline-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exportado');
}

function abrirImport(){ document.getElementById('fileImport').click(); }
function importarCSV(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const txt = e.target.result.replace(/^﻿/, '');
      const linhas = txt.split(/\r?\n/).filter(l=>l.trim());
      if(linhas.length<2){ alert('CSV vazio'); return; }
      const cabec = linhas[0].split(',').map(c=>c.trim().toLowerCase().replace(/"/g,''));
      const novos = linhas.slice(1).map(linha=>{
        const cols = parseCSVLine(linha);
        const o = {};
        cabec.forEach((c,i)=>o[c]=cols[i]||'');
        return {
          id: uid(),
          nome: o.nome||o.contato||o.cliente||'(sem nome)',
          empresa: o.empresa||'',
          valor: parseFloat(o.valor||o.value||'0')||0,
          tag: ['hot','warm','cold'].includes(o.tag) ? o.tag : 'cold',
          etapa: ETAPAS.find(e=>e.id===o.etapa) ? o.etapa : 'lead',
          whatsapp: o.whatsapp||o.telefone||'',
          email: o.email||'',
          obs: o.obs||o.observacoes||'',
          criado: new Date().toISOString(),
          atualizado: new Date().toISOString()
        };
      });
      if(confirm(`Importar ${novos.length} leads? (será adicionado ao pipeline atual)`)){
        leads.push(...novos); salvar(); renderAll();
        toast(novos.length+' leads importados');
      }
    }catch(err){ alert('Erro ao ler CSV: '+err.message); }
  };
  r.readAsText(f, 'utf-8');
  ev.target.value = '';
}
function parseCSVLine(line){
  const out = []; let cur = ''; let dentro = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ if(dentro && line[i+1]==='"'){ cur+='"'; i++; } else dentro=!dentro; }
    else if(c===',' && !dentro){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}

function renderAll(){ renderStats(); renderBoard(); }

// Demo data se vazio
if(leads.length===0){
  leads = [
    {id:uid(), nome:'João Silva', empresa:'TechCorp', valor:8500, tag:'hot', etapa:'proposta', whatsapp:'(11) 98765-4321', email:'joao@techcorp.com', obs:'Quer fechar até sexta', criado:new Date(Date.now()-2*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Maria Souza', empresa:'Beta Ltda', valor:12000, tag:'warm', etapa:'reuniao', whatsapp:'', email:'maria@beta.com', obs:'', criado:new Date(Date.now()-5*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Pedro Lima', empresa:'Gama SA', valor:4200, tag:'cold', etapa:'lead', whatsapp:'', email:'', obs:'Veio do LinkedIn', criado:new Date().toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Ana Castro', empresa:'Delta Co', valor:22000, tag:'hot', etapa:'negociacao', whatsapp:'', email:'', obs:'Negociando desconto de 10%', criado:new Date(Date.now()-10*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Carlos Mendes', empresa:'Epsilon', valor:6800, tag:'warm', etapa:'qualif', whatsapp:'', email:'', obs:'', criado:new Date(Date.now()-3*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Beatriz Rocha', empresa:'Zeta Tech', valor:15000, tag:'hot', etapa:'fechado', whatsapp:'', email:'', obs:'Fechou! Onboarding semana que vem.', criado:new Date(Date.now()-15*86400000).toISOString(), atualizado:new Date().toISOString()}
  ];
  salvar();
}

// fecha modal com Esc
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') fecharModal();
  if(e.key==='Enter' && document.getElementById('modalBg').classList.contains('open') && document.activeElement.tagName!=='TEXTAREA'){
    salvarLead();
  }
});
document.getElementById('modalBg').addEventListener('click', e=>{
  if(e.target.id==='modalBg') fecharModal();
});

renderAll();
</script>
</body>
</html>
