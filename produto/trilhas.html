<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilhas de Treinamento · Agente Comercial IA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e27;--bg2:#0f1438;--card:#151b3d;--card2:#1a2147;
    --text:#e8ecff;--muted:#9aa3c7;--line:#1f2752;
    --accent:#6366f1;--accent2:#8b5cf6;--green:#10b981;--gold:#fbbf24;--red:#ef4444;--blue:#3b82f6;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
  button{font-family:inherit;cursor:pointer;border:none}

  .topbar{background:rgba(10,14,39,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
  .logo{font-weight:800;font-size:16px;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;margin-left:18px;font-weight:600}
  .nav-links a:hover,.nav-links a.active{color:var(--text)}

  .container{max-width:1200px;margin:0 auto;padding:32px 24px}
  h1{font-size:30px;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
  .head-sub{color:var(--muted);font-size:15px;margin-bottom:32px;max-width:760px}

  /* TRILHAS GRID */
  .trilhas{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px}
  .trilha-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .trilha-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 14px 40px rgba(99,102,241,.15)}
  .trilha-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
  .trilha-card.spin::before{background:linear-gradient(90deg,#3b82f6,#6366f1)}
  .trilha-card.disc::before{background:linear-gradient(90deg,#fbbf24,#ef4444,#10b981,#3b82f6)}
  .trilha-card.tour::before{background:linear-gradient(90deg,#10b981,#8b5cf6)}
  .trilha-emoji{font-size:36px;margin-bottom:14px}
  .trilha-card h3{font-size:20px;font-weight:800;margin-bottom:6px}
  .trilha-card p{color:var(--muted);font-size:14px;margin-bottom:16px}
  .trilha-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding-top:14px;border-top:1px solid var(--line)}
  .trilha-progress{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin:10px 0}
  .trilha-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s}
  .trilha-card.completa .trilha-progress-fill{background:linear-gradient(90deg,#10b981,#34d399)}

  /* LESSON VIEW */
  .lesson-view{display:none}
  .lesson-view.ativa{display:block}
  .voltar{background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--line);margin-bottom:20px;display:inline-flex;align-items:center;gap:6px}
  .voltar:hover{color:var(--text);border-color:var(--accent)}

  .lesson-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:20px;flex-wrap:wrap}
  .lesson-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .lesson-title{font-size:26px;font-weight:800;letter-spacing:-.01em}

  .lesson-grid{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:flex-start}
  @media(max-width:780px){.lesson-grid{grid-template-columns:1fr}}

  /* SIDEBAR LESSONS */
  .sidebar{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;position:sticky;top:80px}
  .sidebar h4{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:10px;padding:0 6px}
  .lesson-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:.15s;margin-bottom:2px}
  .lesson-link:hover{background:var(--bg2)}
  .lesson-link.ativa{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700}
  .lesson-link .num{background:var(--bg2);width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted)}
  .lesson-link.ativa .num{background:rgba(255,255,255,.2);color:#fff}
  .lesson-link.completa .num{background:var(--green);color:#fff}
  .lesson-link.completa .num::before{content:'✓'}
  .lesson-link.completa .num span{display:none}

  /* CONTENT */
  .content{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:32px}
  .content h2{font-size:22px;font-weight:800;margin-bottom:14px;color:var(--text)}
  .content h3{font-size:17px;font-weight:700;margin:24px 0 10px;color:#a5b4fc}
  .content p{margin-bottom:14px;color:var(--text)}
  .content ul,.content ol{margin:12px 0 16px 24px}
  .content li{margin-bottom:6px;color:var(--text)}
  .content blockquote{border-left:4px solid var(--accent);background:rgba(99,102,241,.06);padding:14px 18px;margin:16px 0;border-radius:0 8px 8px 0;font-style:italic;color:#c4b5fd}
  .content .destaque{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);padding:14px 16px;border-radius:8px;margin:14px 0;font-size:14px}
  .content .destaque strong{color:var(--gold)}
  .content code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'Monaco',monospace;font-size:13px;color:#a5b4fc}

  .lesson-actions{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--line);gap:12px;flex-wrap:wrap}
  .btn{padding:11px 18px;border-radius:8px;font-weight:700;font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
  .btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
  .btn-ghost{background:var(--bg2);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent)}

  .badge-completa{background:rgba(16,185,129,.15);color:#6ee7b7;font-size:11px;font-weight:700;padding:5px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em}

  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--green);color:var(--green);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;display:none}
  .toast.show{display:block}

</style>

<script>
const TRILHAS = {
  spin: {
    nome:'SPIN Selling',
    emoji:'🎯',
    cor:'spin',
    desc:'O método de venda consultiva mais usado no mundo. 5 aulas pra dominar perguntas de Situação, Problema, Implicação e Necessidade.',
    aulas:[
      {
        titulo:'O que é SPIN Selling',
        conteudo:`<h2>O que é SPIN Selling</h2>
<p>SPIN é um método de venda consultiva criado por Neil Rackham nos anos 1980, baseado na análise de mais de 35.000 calls de venda reais. A descoberta foi anti-intuitiva: vendedores top não falam mais — eles <strong>perguntam mais e melhor</strong>.</p>
<h3>O acrônimo</h3>
<ul>
<li><strong>S</strong>ituation — Situação (contexto factual)</li>
<li><strong>P</strong>roblem — Problema (dor que o cliente tem)</li>
<li><strong>I</strong>mplication — Implicação (custo de não resolver)</li>
<li><strong>N</strong>eed-payoff — Necessidade de solução (o ganho)</li>
</ul>
<h3>Por que funciona</h3>
<p>SPIN funciona porque inverte a lógica tradicional. Em vez de você apresentar quanto seu produto é bom, você faz o cliente verbalizar o tamanho da dor dele. Quando ele diz em voz alta "isso tá custando 80 mil por mês", a apresentação do produto fica fácil — ele já decidiu sozinho que precisa de solução.</p>
<blockquote>"O cliente que disse o tamanho do problema dele em voz alta não consegue mais fingir que ele é pequeno."</blockquote>
<h3>SPIN vs script tradicional</h3>
<p>Script tradicional: você fala 70%, o cliente fala 30%. Você apresenta produto, ele decide se compra.</p>
<p>SPIN: você fala 30%, o cliente fala 70%. Você faz pergunta, ele descobre a dor sozinho. Você só conecta a solução no final.</p>
<div class="destaque"><strong>Importante:</strong> SPIN não é mágica. É disciplina. Você vai precisar resistir à vontade de "vender logo" e ficar nas perguntas até o cliente verbalizar a dor. As primeiras 10 calls vão ser estranhas. Depois vira automático.</div>
<h3>Quando usar SPIN</h3>
<p>SPIN funciona melhor em vendas consultivas, B2B, com ticket médio-alto e ciclo médio (semanas a meses). Em venda transacional rápida (pra consumidor final, ticket baixo), o método é overkill — uma simples apresentação direta resolve.</p>
<p>Se sua venda envolve: múltiplos decisores, comparação com concorrentes, customização da solução, valor acima de R$ 10 mil — SPIN é seu melhor amigo.</p>`
      },
      {
        titulo:'Perguntas de Situação',
        conteudo:`<h2>Perguntas de Situação</h2>
<p>Perguntas de Situação são factuais — pra entender o contexto do cliente. Você usa POUCO. Apenas o suficiente pra não ser ignorante na conversa que vem depois.</p>
<h3>Exemplos por segmento</h3>
<p><strong>Vendendo software de pipeline:</strong></p>
<ul>
<li>Quantos consultores no time comercial?</li>
<li>Como vocês organizam o pipeline hoje? Planilha, CRM?</li>
<li>Qual o ticket médio de venda?</li>
<li>Ciclo médio de fechamento?</li>
</ul>
<p><strong>Vendendo consultoria:</strong></p>
<ul>
<li>Quanto tempo a operação tá nesse formato atual?</li>
<li>Quem mais participa da decisão?</li>
<li>Já tentaram resolver isso de alguma forma?</li>
</ul>
<h3>O erro fatal</h3>
<p>Vendedor médio gasta 20-30 minutos em Situação. Pergunta tudo. "Quantos funcionários? Faturamento? Há quanto tempo no mercado? Onde tá localizada a sede?". O cliente fica entediado, sente que tá sendo entrevistado por censo, perde paciência.</p>
<div class="destaque"><strong>Regra:</strong> máximo 3-5 perguntas de Situação. Se você precisar saber mais, pesquise no LinkedIn ANTES da call. Use a call pra entrar na DOR — não pra coletar dados que estão públicos.</div>
<h3>Como conduzir bem</h3>
<p>Faça as perguntas em sequência rápida, com transições suaves: "Entendi. E pra organizar o pipeline, vocês usam ferramenta ou planilha?". Pergunta-resposta-conexão-pergunta.</p>
<p>Pergunte só o que vai usar depois nas perguntas de Problema. Se a resposta da Situação não vai impactar como você vai abordar o Problema, corta a pergunta.</p>
<h3>Treino prático</h3>
<p>Pega um lead seu real. Escreve as 4 perguntas de Situação que VOCÊ faria amanhã. Compare com o que você normalmente pergunta. Você provavelmente faz mais — e provavelmente vai cortar 2 ou 3.</p>
<blockquote>"Situação é só o aquecimento. A música boa começa quando você entra em Problema."</blockquote>`
      },
      {
        titulo:'Perguntas de Problema',
        conteudo:`<h2>Perguntas de Problema</h2>
<p>Aqui você começa a colher ouro. Perguntas de Problema fazem o cliente verbalizar as dores que ele já vive. Você não tá criando problema — tá ativando consciência sobre o que ele já sente mas não articula.</p>
<h3>A estrutura clássica</h3>
<p>Toda pergunta de Problema gira em torno de:</p>
<ul>
<li>O que tá <strong>frustrando</strong>?</li>
<li>O que tá <strong>travado</strong>?</li>
<li>Onde vocês <strong>perdem</strong>?</li>
<li>O que <strong>incomoda</strong>?</li>
</ul>
<h3>Exemplos potentes</h3>
<p><strong>Pra venda B2B:</strong></p>
<ul>
<li>Em qual etapa do funil vocês mais perdem oportunidade?</li>
<li>O que mais frustra você na operação atual?</li>
<li>Quando foi a última vez que um deal escapou e você ficou puto?</li>
<li>Qual processo hoje toma tempo demais e gera pouco resultado?</li>
<li>Se você pudesse mudar UMA coisa na rotina do time, qual seria?</li>
</ul>
<h3>A regra do silêncio</h3>
<p>Faça a pergunta. AGUENTE o silêncio. O cliente vai pensar 5-10 segundos antes de responder — e nesse tempo o cérebro dele tá processando e priorizando dores. NÃO INTERROMPA. Não complete a pergunta. Não dê exemplos. Espera.</p>
<p>Quem fala primeiro depois da pergunta entrega controle. Faça a pergunta, encara, espera. O closer raiz silencia.</p>
<h3>Como anotar</h3>
<p>Anote LITERALMENTE o que o cliente disse. Mesmas palavras. Não traduza pro seu jargão. Se ele disse "a galera tá largando o pipeline", você anota "galera larga pipeline". Vai usar essas palavras DELE depois na apresentação. Soa familiar pra ele = compra mais rápido.</p>
<div class="destaque"><strong>Pegada psicológica:</strong> quando você devolve a frase exata do cliente, ele sente "esse cara me entendeu". Quando você traduz pro seu vocabulário ("você tá tendo um desafio de qualificação top-of-funnel"), ele sente "esse cara não entendeu, só vomitou jargão".</div>
<h3>Quantas perguntas</h3>
<p>4-6 perguntas de Problema é o doce. Menos de 3 e você não cobriu o suficiente. Mais de 7 e o cliente sente interrogatório. Cada pergunta deve abrir uma frente nova de dor, não repetir a anterior em palavras diferentes.</p>
<blockquote>"O problema do meu cliente vale ouro — pra mim e pra ele. Pra mim, porque vai virar minha apresentação. Pra ele, porque até verbalizar, ele não tinha clareza do tamanho."</blockquote>`
      },
      {
        titulo:'Perguntas de Implicação',
        conteudo:`<h2>Perguntas de Implicação</h2>
<p>Esse é o passo que separa amador de profissional. Você pega a dor que o cliente articulou em "Problema" e amplia o impacto dela. O objetivo: fazer ele perceber que o buraco é maior do que ele inicialmente achou.</p>
<h3>A fórmula</h3>
<p>Pega a dor → conecta com consequência → quantifica → projeta no futuro.</p>
<p>Exemplo. Cliente disse: "A gente perde leads no follow-up porque o consultor esquece."</p>
<p>Implicação 1 (consequência imediata): "E quando perde lead no follow-up, em quanto isso impacta o fechamento mensal?"</p>
<p>Implicação 2 (consequência cadeia): "Esses leads que esfriam, eles ficam pra concorrente?"</p>
<p>Implicação 3 (futuro): "Se continuar nesse ritmo mais 6 meses, o que acontece com a meta anual?"</p>
<p>Implicação 4 (emocional): "Como o time se sente quando isso acontece? Reflete no clima?"</p>
<h3>Por que isso muda tudo</h3>
<p>Antes da Implicação, o cliente tinha uma "questãozinha". Depois, ele percebe que tem um BURACO. E buraco grande exige solução grande. Aqui você cria a urgência ECONÔMICA da decisão.</p>
<div class="destaque"><strong>Regra de ouro:</strong> a Implicação deve ser LIDERADA pelo cliente. Você pergunta, ele dimensiona. Se você falar "isso deve estar custando 50 mil por mês", soa como pressão. Se ELE falar "calculei aqui, deve estar uns 50 mil por mês", soa como verdade dele.</div>
<h3>Quanto vale uma Implicação bem feita</h3>
<p>Estudo de Rackham mostrou que vendedores top fazem 4x mais perguntas de Implicação que vendedores médios. Vendedor médio pergunta sobre o problema, ouve, e parte pra solução. Top fica nas implicações 5-10 minutos. Esse tempo "investido" multiplica por 3-5 a taxa de fechamento.</p>
<h3>Exemplos por dor</h3>
<p><strong>Cliente diz:</strong> "Os leads chegam frios."</p>
<p><strong>Implicações:</strong></p>
<ul>
<li>Quanto tempo o consultor gasta esquentando lead frio?</li>
<li>Esse tempo sai de quê — de prospecção nova ou de fechamento de quente?</li>
<li>Vocês já calcularam o custo de oportunidade?</li>
<li>Se o tempo fosse direcionado pra leads quentes, qual seria o impacto na meta?</li>
</ul>
<p>Vê como cada pergunta amplia o problema sem o cliente perceber? No final, ele tá quase pedindo pra você apresentar a solução.</p>
<blockquote>"Implicação é o ponto onde a venda nasce. Antes dela, o cliente acha que pode resolver depois. Depois dela, ele entende que precisa resolver agora."</blockquote>`
      },
      {
        titulo:'Perguntas de Necessidade de Solução',
        conteudo:`<h2>Perguntas de Necessidade de Solução</h2>
<p>Última etapa do SPIN — e a mais elegante. Aqui você inverte. Em vez de continuar amplificando dor, você faz o cliente projetar o ALÍVIO. Faz ele se vender a si mesmo a solução.</p>
<h3>A diferença que muda tudo</h3>
<p>Em Implicação você perguntou: "Quanto tá custando esse problema?"</p>
<p>Em Necessidade de Solução você pergunta: "Se você tivesse uma forma de resolver isso, quanto valeria?"</p>
<p>O cliente responde — e a resposta dele vira sua âncora de preço, sua justificativa de ROI, e seu argumento de fechamento. Tudo de uma vez.</p>
<h3>Exemplos</h3>
<ul>
<li>Se você pudesse ver onde cada lead tá em tempo real, o que mudaria pra você?</li>
<li>Se a gente reduzisse esse problema em 30%, qual seria o impacto na meta?</li>
<li>Vale a pena investigar uma solução que aumenta sua taxa de conversão em 20%?</li>
<li>Se o seu time conseguisse fazer follow-up automático, isso liberaria tempo pra fazer o quê?</li>
<li>Imagina que esse processo dura 5 minutos em vez de 1 hora — onde vocês investiriam o tempo livre?</li>
</ul>
<h3>O efeito psicológico</h3>
<p>Quando o cliente articula o ganho com SUAS palavras, ele cria um compromisso mental. É a famosa "ilusão de propriedade" da psicologia: ideia que parece ter sido sua é defendida muito mais do que ideia que parece ter sido imposta.</p>
<div class="destaque"><strong>Truque avançado:</strong> depois da resposta dele, você devolve com uma reformulação positiva: "Então, se eu entendi, o que você tá buscando é (X) e (Y). E isso geraria (Z) de impacto. Tá certo?". Ele confirma. Você acaba de criar a tese da apresentação que vem a seguir.</div>
<h3>O passe pra apresentação</h3>
<p>Depois de 2-3 perguntas de Necessidade de Solução, o cliente tá maduro pra você apresentar. Você diz: "Beleza, com base no que você me contou — e no que você acabou de descrever como ideal — deixa eu te mostrar como a gente atende exatamente isso."</p>
<p>A apresentação que vem agora não é "sobre o produto". É "sobre a solução do problema dele". Conexão direta. Taxa de conversão dispara.</p>
<h3>Resumo do método</h3>
<ol>
<li>Situação (3-5 perguntas) — entende o terreno</li>
<li>Problema (4-6 perguntas) — colhe dores</li>
<li>Implicação (5-10 perguntas) — amplia impacto</li>
<li>Necessidade de Solução (2-3 perguntas) — faz o cliente articular o ganho</li>
<li>Apresentação direta da solução conectada à dor verbalizada</li>
</ol>
<blockquote>"Se você fizer SPIN bem, sua apresentação dura 10 minutos e o cliente já tá pedindo o contrato. Se você pular SPIN, sua apresentação dura 1 hora e o cliente pede pra pensar."</blockquote>
<p style="margin-top:24px"><strong>🎉 Trilha SPIN concluída!</strong> Você dominou o esqueleto da venda consultiva. Pratica em 3 calls esta semana e marca como completa quando tiver feito.</p>`
      }
    ]
  },
  disc: {
    nome:'DISC',
    emoji:'🎨',
    cor:'disc',
    desc:'Aprenda a identificar os 4 perfis comportamentais e adaptar seu estilo de venda. Decisão é emocional — DISC te dá o mapa.',
    aulas:[
      {
        titulo:'Os 4 perfis DISC',
        conteudo:`<h2>Os 4 perfis DISC</h2>
<p>DISC é um modelo comportamental que classifica pessoas em 4 perfis dominantes. Não é teste de personalidade — é leitura de COMO essa pessoa toma decisão. Closer profissional lê o perfil em 90 segundos e adapta o estilo.</p>
<h3>Os 4 perfis</h3>
<p><strong>D — Dominância</strong> 🔴<br>
Direto, orientado a resultado, decide rápido, gosta de controle.</p>
<p><strong>I — Influência</strong> 🟡<br>
Sociável, otimista, comunicativo, gosta de estar no centro.</p>
<p><strong>S — Estabilidade</strong> 🟢<br>
Calmo, paciente, leal, evita conflito, valoriza segurança.</p>
<p><strong>C — Conformidade</strong> 🔵<br>
Analítico, detalhista, lógico, busca precisão e dados.</p>
<h3>Eixos do modelo</h3>
<p>DISC se organiza em 2 eixos:</p>
<ul>
<li><strong>Ritmo:</strong> rápido (D, I) vs lento (S, C)</li>
<li><strong>Foco:</strong> tarefa (D, C) vs pessoa (I, S)</li>
</ul>
<p>Combinando os dois:</p>
<ul>
<li>Rápido + Tarefa = D</li>
<li>Rápido + Pessoa = I</li>
<li>Lento + Pessoa = S</li>
<li>Lento + Tarefa = C</li>
</ul>
<div class="destaque"><strong>Importante:</strong> ninguém é 100% de um perfil. Cada pessoa tem um dominante e um secundário. A ideia é identificar o DOMINANTE pra adaptar o estilo — sem rotular ninguém.</div>
<h3>Por que isso importa pra venda</h3>
<p>Decisão de compra é 80% emocional, 20% racional. As pessoas compram por motivos emocionais e justificam por motivos racionais. O DISC te diz QUE EMOÇÃO mover em cada perfil.</p>
<ul>
<li>D compra por <strong>resultado</strong> (o que vou ganhar?)</li>
<li>I compra por <strong>pertencimento</strong> (vou parecer legal?)</li>
<li>S compra por <strong>segurança</strong> (vou estar protegido?)</li>
<li>C compra por <strong>certeza</strong> (a decisão é correta?)</li>
</ul>
<p>Vendedor que apresenta resultado pra um C perdeu. Vendedor que apresenta dados pra um I perdeu. A apresentação tem que ser TRADUZIDA pro perfil do interlocutor.</p>

<h3>Os 3 sinais pra identificar em 90s</h3>
<ol>
<li><strong>Velocidade da fala</strong> — rápido (D ou I) vs lento (S ou C)</li>
<li><strong>Foco do conteúdo</strong> — pessoas (I ou S) vs tarefa/dado (D ou C)</li>
<li><strong>Reação a pressão</strong> — avança (D), vibra (I), recua (S), questiona (C)</li>
</ol>
<p>Cruzando esses 3 sinais nos primeiros minutos da call, você fecha o perfil dominante e adapta o estilo. As próximas 4 aulas detalham cada perfil.</p>`

<p><strong>3. Customer Success</strong></p>

<p>Não vende — orquestra. Define estratégia, acompanha pipeline, faz coaching individual, decide investimento e contratação.</p>
<h3>Por que separar SDR e Closer</h3>

<p>SDR custa 3-5x menos que closer. Se um SDR entrega 30 leads qualificados por mês, e closer fecha 30% deles a R$ 10k cada, são R$ 90k de receita gerada — pra um custo de SDR de R$ 4-8k. ROI de 11x.</p>
<h3>Quando criar cada função</h3>
<p>Se sua operação fatura até R$ 50k/mês: <strong>1 vendedor</strong> faz tudo (SDR + closer + CS).</p>
<p>R$ 50-200k/mês: <strong>1 SDR + 1 closer</strong>. Separa a tarefa repetitiva da tarefa de alto valor.</p>
<p>R$ 200-500k/mês: <strong>2 SDRs + 2 closers + 1 CS</strong>. Cresce volume mantendo qualidade.</p>
<p>R$ 500k-1M/mês: estrutura completa com gestor dedicado.</p>
<div class="destaque"><strong>Erro comum:</strong> contratar mais closer quando o gargalo é prospecção. Você vai ter closer ocioso, frustrado, indo embora. Antes de adicionar closer, verifique se o SDR tá entregando lead suficiente. Se não, contrate SDR primeiro.</div>

<p>Gestor: visão sistêmica, dá feedback bem, motivador, decisor sob pressão.</p>

let progresso = JSON.parse(localStorage.getItem('trilhas_progresso') || '{}');
let trilhaAtual = null;
let aulaAtual = 0;

function salvarProgresso(){ localStorage.setItem('trilhas_progresso', JSON.stringify(progresso)); }
function progressoTrilha(tid){
  const t = TRILHAS[tid];
  const feitas = (progresso[tid] || []).length;
  return { feitas, total:t.aulas.length, pct:Math.round(feitas/t.aulas.length*100) };
}

function renderHome(){
  const ts = Object.entries(TRILHAS).map(([tid, t])=>{
    const p = progressoTrilha(tid);
    const completa = p.feitas === p.total;
    return `
      <div class="trilha-card ${t.cor} ${completa?'completa':''}" onclick="abrirTrilha('${tid}')">
        <div class="trilha-emoji">${t.emoji}</div>
        <h3>${t.nome}</h3>
        <p>${t.desc}</p>
        <div class="trilha-progress"><div class="trilha-progress-fill" style="width:${p.pct}%"></div></div>
        <div class="trilha-meta">
          <span>${p.feitas}/${p.total} aulas · ${p.pct}%</span>
          <span>${completa?'✅ Concluída':p.feitas>0?'Em andamento':'Não iniciada'}</span>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('trilhas').innerHTML = ts;
}

function abrirTrilha(tid){
  trilhaAtual = tid;
  aulaAtual = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('lessonView').classList.add('ativa');
  renderLesson();
}

function voltarHome(){
  document.getElementById('home').style.display = 'block';
  document.getElementById('lessonView').classList.remove('ativa');
  renderHome();
  trilhaAtual = null;
}

function renderLesson(){
  if(!trilhaAtual) return;
  const t = TRILHAS[trilhaAtual];
  const aula = t.aulas[aulaAtual];
  const feitas = progresso[trilhaAtual] || [];
  document.getElementById('trilhaTag').textContent = t.emoji + ' ' + t.nome;
  document.getElementById('trilhaTitulo').textContent = aula.titulo;
  document.getElementById('trilhaProgressInfo').innerHTML = `Aula ${aulaAtual+1} de ${t.aulas.length}<br>Progresso: ${feitas.length}/${t.aulas.length}`;

  const lista = t.aulas.map((a,i)=>`
    <div class="lesson-link ${i===aulaAtual?'ativa':''} ${feitas.includes(i)?'completa':''}" onclick="irParaAula(${i})">
      <span class="num"><span>${i+1}</span></span>
      <span>${a.titulo}</span>
    </div>
  `).join('');
  document.getElementById('lessonsLista').innerHTML = lista;

  const completa = feitas.includes(aulaAtual);
  document.getElementById('lessonContent').innerHTML = `
    ${aula.conteudo}
    <div class="lesson-actions">
      <button class="btn btn-ghost" onclick="prevAula()" ${aulaAtual===0?'disabled':''} style="${aulaAtual===0?'opacity:.4;cursor:not-allowed':''}">← Anterior</button>
      <div style="display:flex;gap:10px;align-items:center">
        ${completa?'<span class="badge-completa">✓ Concluída</span>':`<button class="btn btn-success" onclick="marcarConcluida()">✓ Marcar como concluída</button>`}
        <button class="btn btn-primary" onclick="proxAula()" ${aulaAtual===t.aulas.length-1?'disabled':''} style="${aulaAtual===t.aulas.length-1?'opacity:.4;cursor:not-allowed':''}">Próxima →</button>
      </div>
    </div>
  `;
  window.scrollTo(0,0);
}

function irParaAula(i){ aulaAtual = i; renderLesson(); }
function prevAula(){ if(aulaAtual>0){ aulaAtual--; renderLesson(); } }
function proxAula(){
  const t = TRILHAS[trilhaAtual];
  if(aulaAtual < t.aulas.length-1){ aulaAtual++; renderLesson(); }
}

function marcarConcluida(){
  if(!progresso[trilhaAtual]) progresso[trilhaAtual] = [];
  if(!progresso[trilhaAtual].includes(aulaAtual)){
    progresso[trilhaAtual].push(aulaAtual);
    salvarProgresso();
    toast('Aula concluída! 🎉');
  }
  renderLesson();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

renderHome();
</script>
