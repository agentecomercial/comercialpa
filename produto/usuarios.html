<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Usuários · Agente Comercial IA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e27;--bg2:#0f1438;--card:#151b3d;--card2:#1a2147;
    --text:#e8ecff;--muted:#9aa3c7;--line:#1f2752;
    --accent:#6366f1;--accent2:#8b5cf6;--green:#10b981;--gold:#fbbf24;--red:#ef4444;--blue:#3b82f6;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select{font-family:inherit;background:var(--bg2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--accent)}

  .topbar{background:rgba(10,14,39,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
  .logo{font-weight:800;font-size:16px;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;margin-left:18px;font-weight:600}
  .nav-links a:hover,.nav-links a.active{color:var(--text)}

  .container{max-width:1200px;margin:0 auto;padding:24px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  h1{font-size:24px;font-weight:800;margin-bottom:4px}
  .head-sub{color:var(--muted);font-size:13px}

  .btn{padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;transition:.2s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
  .btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--accent)}
  .btn-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.25)}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600}
  .stat-val{font-size:22px;font-weight:800}
  .stat-val.green{color:var(--green)}.stat-val.gold{color:var(--gold)}.stat-val.blue{color:#a5b4fc}

  /* TOOLBAR */
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar input{max-width:280px}
  .toolbar select{max-width:160px}

  /* TABLE */
  .table-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--card2);text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line)}
  td{padding:14px 16px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(99,102,241,.04)}

  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin-right:8px;vertical-align:middle}
  .nome-cell{display:flex;align-items:center;gap:10px}
  .nome-info{display:flex;flex-direction:column}
  .nome-titulo{font-weight:700;font-size:13px}
  .nome-email{color:var(--muted);font-size:11px}

  .badge{display:inline-block;font-size:10px;font-weight:700;padding:4px 10px;border-radius:12px;letter-spacing:.05em;text-transform:uppercase}
  .badge-admin{background:rgba(239,68,68,.15);color:#fca5a5}
  .badge-gestor{background:rgba(99,102,241,.15);color:#a5b4fc}
  .badge-consultor{background:rgba(16,185,129,.15);color:#6ee7b7}
  .badge-ativo{background:rgba(16,185,129,.15);color:#6ee7b7}
  .badge-inativo{background:rgba(154,163,199,.15);color:var(--muted)}

  .acoes-row{display:flex;gap:6px}
  .icon-btn{background:transparent;border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;transition:.15s}
  .icon-btn:hover{border-color:var(--accent);color:var(--text)}
  .icon-btn.danger:hover{border-color:var(--red);color:#fca5a5}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-emoji{font-size:48px;margin-bottom:14px;opacity:.5}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:18px;margin-bottom:16px;font-weight:700}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--green);color:var(--green);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;display:none}
  .toast.show{display:block}

  @media(max-width:780px){
    table th:nth-child(3),table td:nth-child(3){display:none}
    table th:nth-child(5),table td:nth-child(5){display:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">👥 Gestão de Usuários</div>
  <div class="nav-links">
    <a href="pipeline.html">Pipeline</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="biblioteca-cold-call.html">Cold Call</a>
    <a href="usuarios.html" class="active">Usuários</a>
  </div>
</div>

<div class="container">

  <div class="head">
    <div>
      <h1>Gestão de Usuários</h1>
      <div class="head-sub">Cadastre admins, gestores e consultores. Controle papéis, status e acesso.</div>
    </div>
    <button class="btn btn-primary" onclick="abrirModal()">+ Novo usuário</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="search" id="busca" placeholder="🔍 Buscar por nome ou email..." oninput="render()">
    <select id="filtroPapel" onchange="render()">
      <option value="">Todos os papéis</option>
      <option value="admin">Admin</option>
      <option value="gestor">Gestor</option>
      <option value="consultor">Consultor</option>
    </select>
    <select id="filtroStatus" onchange="render()">
      <option value="">Todos os status</option>
      <option value="ativo">Ativos</option>
      <option value="inativo">Inativos</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="tabela">
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Papel</th>
          <th>WhatsApp</th>
          <th>Status</th>
          <th>Adicionado</th>
          <th style="width:120px">Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitulo">Novo usuário</h3>
    <div class="field-row">
      <div class="field"><label>Nome completo *</label><input id="f-nome" required></div>
      <div class="field"><label>Email *</label><input id="f-email" type="email" required></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Papel *</label>
        <select id="f-papel">
          <option value="consultor">Consultor</option>
          <option value="gestor">Gestor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>WhatsApp</label><input id="f-whatsapp" placeholder="(11) 99999-9999"></div>
      <div class="field"><label>Senha temporária</label><input id="f-senha" type="text" placeholder="Mínimo 6 caracteres"></div>
    </div>
    <div class="field"><label>Meta individual mensal (R$)</label><input id="f-meta" type="number" step="100" min="0" value="0"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-excluir" onclick="excluirUser()" style="display:none">Excluir</button>
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarUser()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PAPEIS = {
  admin: {label:'Admin', desc:'Acesso total + gestão de usuários'},
  gestor: {label:'Gestor', desc:'Vê todos os pipelines + relatórios'},
  consultor: {label:'Consultor', desc:'Pipeline próprio + agente IA'}
};

let users = JSON.parse(localStorage.getItem('pipeline_users') || '[]');
let editandoId = null;

function uid(){ return 'u'+Date.now()+Math.random().toString(36).slice(2,7); }
function salvar(){ localStorage.setItem('pipeline_users', JSON.stringify(users)); }
function fmt(v){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(v||0); }
function inicial(s){ return (s||'').trim().split(/\s+/).slice(0,2).map(p=>p[0]||'').join('').toUpperCase() || '?'; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderStats(){
  const total = users.length;
  const ativos = users.filter(u=>u.status==='ativo').length;
  const consultores = users.filter(u=>u.papel==='consultor' && u.status==='ativo').length;
  const metaTot = users.filter(u=>u.status==='ativo').reduce((s,u)=>s+(parseFloat(u.meta)||0),0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Usuários ativos</div><div class="stat-val green">${ativos}</div><div class="stat-sub">de ${total} total</div></div>
    <div class="stat"><div class="stat-label">Consultores</div><div class="stat-val blue">${consultores}</div><div class="stat-sub">vendendo agora</div></div>
    <div class="stat"><div class="stat-label">Meta total mensal</div><div class="stat-val gold">${fmt(metaTot)}</div><div class="stat-sub">soma das metas individuais</div></div>
    <div class="stat"><div class="stat-label">Plano (limite)</div><div class="stat-val">${ativos}/10</div><div class="stat-sub">consultores ativos</div></div>
  `;
}

function render(){
  renderStats();
  const busca = document.getElementById('busca').value.toLowerCase();
  const fp = document.getElementById('filtroPapel').value;
  const fs = document.getElementById('filtroStatus').value;
  const lista = users.filter(u=>{
    if(fp && u.papel!==fp) return false;
    if(fs && u.status!==fs) return false;
    if(busca){
      const txt = (u.nome+' '+u.email).toLowerCase();
      if(!txt.includes(busca)) return false;
    }
    return true;
  });
  const tbody = document.getElementById('tbody');
  if(lista.length===0){
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-emoji">👤</div><div>Nenhum usuário encontrado</div><div style="font-size:12px;margin-top:6px">Cadastre o primeiro usuário pra começar</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = lista.map(u=>`
    <tr>
      <td>
        <div class="nome-cell">
          <div class="avatar">${inicial(u.nome)}</div>
          <div class="nome-info">
            <span class="nome-titulo">${escapeHtml(u.nome||'(sem nome)')}</span>
            <span class="nome-email">${escapeHtml(u.email||'')}</span>
          </div>
        </div>
      </td>
      <td><span class="badge badge-${u.papel}">${PAPEIS[u.papel]?.label||u.papel}</span></td>
      <td>${escapeHtml(u.whatsapp||'—')}</td>
      <td><span class="badge badge-${u.status}">${u.status==='ativo'?'✓ Ativo':'Inativo'}</span></td>
      <td style="color:var(--muted);font-size:12px">${formatData(u.criado)}</td>
      <td>
        <div class="acoes-row">
          <button class="icon-btn" onclick="abrirModal('${u.id}')" title="Editar">✎</button>
          <button class="icon-btn" onclick="toggleStatus('${u.id}')" title="${u.status==='ativo'?'Desativar':'Ativar'}">${u.status==='ativo'?'⏸':'▶'}</button>
          <button class="icon-btn danger" onclick="excluirDireto('${u.id}')" title="Excluir">🗑</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function formatData(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR');
}

function abrirModal(id){
  editandoId = id || null;
  if(id){
    const u = users.find(x=>x.id===id);
    document.getElementById('modalTitulo').textContent = 'Editar usuário';
    document.getElementById('btn-excluir').style.display = 'inline-flex';
    document.getElementById('f-nome').value = u.nome||'';
    document.getElementById('f-email').value = u.email||'';
    document.getElementById('f-papel').value = u.papel||'consultor';
    document.getElementById('f-status').value = u.status||'ativo';
    document.getElementById('f-whatsapp').value = u.whatsapp||'';
    document.getElementById('f-senha').value = u.senha||'';
    document.getElementById('f-meta').value = u.meta||0;
  }else{
    document.getElementById('modalTitulo').textContent = 'Novo usuário';
    document.getElementById('btn-excluir').style.display = 'none';
    ['f-nome','f-email','f-whatsapp','f-senha'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-papel').value = 'consultor';
    document.getElementById('f-status').value = 'ativo';
    document.getElementById('f-meta').value = 0;
  }
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('f-nome').focus(), 50);
}

function fecharModal(){ document.getElementById('modalBg').classList.remove('open'); editandoId=null; }

function salvarUser(){
  const nome = document.getElementById('f-nome').value.trim();
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  if(!nome || !email){ alert('Nome e email são obrigatórios'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('Email inválido'); return; }
  const senha = document.getElementById('f-senha').value;
  if(senha && senha.length<6){ alert('Senha deve ter ao menos 6 caracteres'); return; }
  // duplicidade de email
  const dup = users.find(u=>u.email===email && u.id!==editandoId);
  if(dup){ alert('Já existe usuário com esse email'); return; }
  const dados = {
    nome, email,
    papel: document.getElementById('f-papel').value,
    status: document.getElementById('f-status').value,
    whatsapp: document.getElementById('f-whatsapp').value.trim(),
    senha: senha,
    meta: parseFloat(document.getElementById('f-meta').value)||0,
    atualizado: new Date().toISOString()
  };
  if(editandoId){
    Object.assign(users.find(u=>u.id===editandoId), dados);
    toast('Usuário atualizado');
  }else{
    dados.id = uid();
    dados.criado = new Date().toISOString();
    users.push(dados);
    toast('Usuário criado');
  }
  salvar(); render(); fecharModal();
}

function excluirUser(){
  if(!editandoId) return;
  if(!confirm('Excluir este usuário? Esta ação não pode ser desfeita.')) return;
  users = users.filter(u=>u.id!==editandoId);
  salvar(); render(); fecharModal();
  toast('Usuário excluído');
}

function excluirDireto(id){
  if(!confirm('Excluir este usuário?')) return;
  users = users.filter(u=>u.id!==id);
  salvar(); render();
  toast('Usuário excluído');
}

function toggleStatus(id){
  const u = users.find(x=>x.id===id);
  u.status = u.status==='ativo' ? 'inativo' : 'ativo';
  u.atualizado = new Date().toISOString();
  salvar(); render();
  toast('Status alterado para ' + (u.status==='ativo'?'Ativo':'Inativo'));
}

document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') fecharModal(); });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') fecharModal();
  if(e.key==='Enter' && document.getElementById('modalBg').classList.contains('open')) salvarUser();
});

// Demo data se vazio
if(users.length===0){
  users = [
    {id:uid(), nome:'Pablo Correia', email:'pablo@empresa.com', papel:'admin', status:'ativo', whatsapp:'(11) 98765-4321', senha:'admin123', meta:50000, criado:new Date(Date.now()-30*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'João Silva', email:'joao@empresa.com', papel:'gestor', status:'ativo', whatsapp:'(11) 91234-5678', senha:'gestor123', meta:80000, criado:new Date(Date.now()-20*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Maria Souza', email:'maria@empresa.com', papel:'consultor', status:'ativo', whatsapp:'', senha:'mudar123', meta:30000, criado:new Date(Date.now()-15*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Pedro Lima', email:'pedro@empresa.com', papel:'consultor', status:'ativo', whatsapp:'', senha:'mudar123', meta:30000, criado:new Date(Date.now()-10*86400000).toISOString(), atualizado:new Date().toISOString()},
    {id:uid(), nome:'Ana Castro', email:'ana@empresa.com', papel:'consultor', status:'inativo', whatsapp:'', senha:'mudar123', meta:30000, criado:new Date(Date.now()-60*86400000).toISOString(), atualizado:new Date().toISOString()}
  ];
  salvar();
}

render();
</script>
</body>
</html>
