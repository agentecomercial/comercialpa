<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview · Cards "🏆 Top consultores"</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --text:#f0f0f0;
  --muted:#888;
  --accent:#c8f05a;
  --pago:#39ff14;

  /* tokens ajustáveis */
  --grid-cols: 3;
  --grid-gap: 12px;
  --card-pad-y: 14px;
  --card-pad-x: 16px;
  --card-radius: 10px;
  --card-gap: 12px;
  --pos-font: 20px;
  --pos-width: 24px;
  --avatar-size: 32px;
  --avatar-font: 13px;
  --nome-font: 13px;
  --val-font: 12px;
  --pct-font: 9px;
  --sub-font: 9px;
  --gap-info: 0px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:24px;
  display:grid;
  grid-template-columns:1fr 320px;
  gap:24px;
}

.main{min-width:0;}
.sec-title{
  font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.sec-title::before{content:"🏆";font-size:14px;}

.np-ranking-strip{
  display:grid;
  grid-template-columns:repeat(var(--grid-cols),minmax(0,1fr));
  gap:var(--grid-gap);
}
.np-rank-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--card-radius);
  padding:var(--card-pad-y) var(--card-pad-x);
  display:flex;align-items:center;
  gap:var(--card-gap);
  cursor:pointer;
  transition:filter .15s, transform .12s;
}
.np-rank-card:hover{filter:brightness(1.08);}
.np-rank-card:active{transform:scale(.98);}
.np-rank-pos{
  font-size:var(--pos-font);
  font-weight:900;
  color:var(--muted);
  width:var(--pos-width);
  flex-shrink:0;
  text-align:center;
}
.np-rank-card:first-child .np-rank-pos{color:#fbbf24;}
.np-rank-avatar{
  width:var(--avatar-size);
  height:var(--avatar-size);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:var(--avatar-font);
  font-weight:800;flex-shrink:0;
}
.np-rank-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--gap-info);}
.np-rank-nome{
  font-size:var(--nome-font);
  font-weight:700;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.np-rank-val{
  font-size:var(--val-font);
  font-weight:700;
  font-variant-numeric:tabular-nums;
}
.np-rank-val .pct{
  font-size:var(--pct-font);
  font-weight:700;
  margin-left:4px;
}
.np-rank-sub{
  font-size:var(--sub-font);
  color:var(--muted);
}

/* Controles */
.controls{
  position:sticky;top:24px;
  align-self:start;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:18px 16px;
  max-height:calc(100vh - 48px);
  overflow-y:auto;
}
.controls h2{
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--accent);margin-bottom:14px;
}
.ctrl{display:flex;flex-direction:column;margin-bottom:12px;}
.ctrl label{
  font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);
  display:flex;justify-content:space-between;
  margin-bottom:4px;font-weight:600;
}
.ctrl label .v{color:var(--accent);font-variant-numeric:tabular-nums;}
.ctrl input[type=range]{width:100%;accent-color:var(--accent);height:18px;}
.group{
  border-top:1px solid var(--border);
  padding-top:12px;margin-top:12px;
}
.group-title{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin-bottom:8px;
}
.actions{
  display:flex;flex-direction:column;gap:8px;
  margin-top:16px;border-top:1px solid var(--border);
  padding-top:14px;
}
.btn{
  background:var(--accent);color:#0f0f0f;
  border:none;border-radius:6px;
  padding:9px 12px;font-weight:700;font-size:12px;
  cursor:pointer;font-family:inherit;transition:opacity .15s;
}
.btn:hover{opacity:.85;}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn.ghost:hover{color:var(--accent);border-color:var(--accent);}
.css-out{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:10px;font-family:'JetBrains Mono',ui-monospace,monospace;
  font-size:10.5px;color:#bcd87a;
  white-space:pre-wrap;max-height:260px;overflow:auto;
  margin-top:10px;display:none;line-height:1.55;
}
.css-out.show{display:block;}
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface);border:1px solid var(--accent);
  color:var(--accent);padding:10px 18px;border-radius:6px;
  font-size:12px;font-weight:700;opacity:0;
  transition:opacity .2s, transform .2s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (max-width:1100px){
  body{grid-template-columns:1fr;}
  .controls{position:relative;top:0;max-height:none;}
}
</style>
</head>
<body>

<div class="main">
  <div class="sec-title">Top consultores</div>
  <div class="np-ranking-strip" id="strip"></div>
</div>

<aside class="controls">
  <h2>🎛 Ajustes do card</h2>

  <div class="group-title">Grid</div>
  <div class="ctrl"><label>Colunas <span class="v" id="vCols">3</span></label>
    <input type="range" id="cCols" min="1" max="5" step="1" value="3"></div>
  <div class="ctrl"><label>Gap entre cards <span class="v" id="vGap">12px</span></label>
    <input type="range" id="cGap" min="4" max="32" step="1" value="12"></div>

  <div class="group">
    <div class="group-title">Card</div>
    <div class="ctrl"><label>Padding vertical <span class="v" id="vPadY">14px</span></label>
      <input type="range" id="cPadY" min="6" max="28" step="1" value="14"></div>
    <div class="ctrl"><label>Padding horizontal <span class="v" id="vPadX">16px</span></label>
      <input type="range" id="cPadX" min="8" max="32" step="1" value="16"></div>
    <div class="ctrl"><label>Border radius <span class="v" id="vRad">10px</span></label>
      <input type="range" id="cRad" min="0" max="24" step="1" value="10"></div>
    <div class="ctrl"><label>Gap entre elementos <span class="v" id="vCgap">12px</span></label>
      <input type="range" id="cCgap" min="4" max="22" step="1" value="12"></div>
  </div>

  <div class="group">
    <div class="group-title">Posição (1, 2, 3)</div>
    <div class="ctrl"><label>Fonte <span class="v" id="vPos">20px</span></label>
      <input type="range" id="cPos" min="12" max="34" step="1" value="20"></div>
    <div class="ctrl"><label>Largura <span class="v" id="vPosW">24px</span></label>
      <input type="range" id="cPosW" min="16" max="42" step="1" value="24"></div>
  </div>

  <div class="group">
    <div class="group-title">Avatar</div>
    <div class="ctrl"><label>Tamanho <span class="v" id="vAva">32px</span></label>
      <input type="range" id="cAva" min="22" max="56" step="1" value="32"></div>
    <div class="ctrl"><label>Fonte <span class="v" id="vAvaF">13px</span></label>
      <input type="range" id="cAvaF" min="10" max="22" step="1" value="13"></div>
  </div>

  <div class="group">
    <div class="group-title">Textos</div>
    <div class="ctrl"><label>Nome (fonte) <span class="v" id="vNome">13px</span></label>
      <input type="range" id="cNome" min="10" max="20" step="1" value="13"></div>
    <div class="ctrl"><label>R$ valor (fonte) <span class="v" id="vVal">12px</span></label>
      <input type="range" id="cVal" min="9" max="20" step="1" value="12"></div>
    <div class="ctrl"><label>% badge (fonte) <span class="v" id="vPct">9px</span></label>
      <input type="range" id="cPct" min="7" max="14" step="1" value="9"></div>
    <div class="ctrl"><label>Sub-info (fonte) <span class="v" id="vSub">9px</span></label>
      <input type="range" id="cSub" min="7" max="14" step="1" value="9"></div>
    <div class="ctrl"><label>Gap entre nome/valor/sub <span class="v" id="vGi">0px</span></label>
      <input type="range" id="cGi" min="0" max="10" step="1" value="0"></div>
  </div>

  <div class="actions">
    <button class="btn" id="btnCss">📋 Gerar CSS final</button>
    <button class="btn ghost" id="btnReset">↺ Resetar padrões</button>
    <pre class="css-out" id="cssOut"></pre>
  </div>
</aside>

<div class="toast" id="toast">CSS copiado ✓</div>

<script>
/* Mock — replica o screenshot do dashboard */
var DADOS = [
  { nome:'DARLEY SANTOS',    real:124319.40, pct:90, info:'Falta R$ 14.005,46 para 🥈 Mínima', conv:46, cor:'#00f0ff', bg:'rgba(0,240,255,.06)',  border:'rgba(0,240,255,.25)', av:'#34d399' },
  { nome:'DANIEL MOURA',     real:61036.59,  pct:44, info:'Falta R$ 77.288,27 para 🥈 Mínima', conv:57, cor:'#ff5500', bg:'rgba(255,85,0,.06)',   border:'rgba(255,85,0,.25)',  av:'#60a5fa' },
  { nome:'JULIANA FABRICIA', real:27131.85,  pct:69, info:'Falta R$ 12.389,54 para 🥈 Mínima', conv:39, cor:'#ffe000', bg:'rgba(255,238,0,.06)',  border:'rgba(255,238,0,.25)', av:'#f59e0b' }
];

function fmtR(v){
  return 'R$ ' + (Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
}

function render(){
  document.getElementById('strip').innerHTML = DADOS.map(function(d, i){
    return '<div class="np-rank-card" style="border-color:'+d.border+';background:'+d.bg+';">'
      + '<div class="np-rank-pos">'+(i+1)+'</div>'
      + '<div class="np-rank-avatar" style="background:'+d.av+'22;color:'+d.av+';border:1.5px solid '+d.av+'55;">'+d.nome.charAt(0)+'</div>'
      + '<div class="np-rank-info">'
      +   '<div class="np-rank-nome">'+d.nome+'</div>'
      +   '<div class="np-rank-val" style="color:'+d.cor+';">'+fmtR(d.real)+'<span class="pct" style="color:'+d.cor+';">'+d.pct+'%</span></div>'
      +   '<div class="np-rank-sub">'+d.info+' · '+d.conv+'% conv</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

var CTRLS = [
  ['cCols','--grid-cols','vCols','',1],
  ['cGap','--grid-gap','vGap','px',1],
  ['cPadY','--card-pad-y','vPadY','px',1],
  ['cPadX','--card-pad-x','vPadX','px',1],
  ['cRad','--card-radius','vRad','px',1],
  ['cCgap','--card-gap','vCgap','px',1],
  ['cPos','--pos-font','vPos','px',1],
  ['cPosW','--pos-width','vPosW','px',1],
  ['cAva','--avatar-size','vAva','px',1],
  ['cAvaF','--avatar-font','vAvaF','px',1],
  ['cNome','--nome-font','vNome','px',1],
  ['cVal','--val-font','vVal','px',1],
  ['cPct','--pct-font','vPct','px',1],
  ['cSub','--sub-font','vSub','px',1],
  ['cGi','--gap-info','vGi','px',1]
];

function aplicar(){
  CTRLS.forEach(function(c){
    var el = document.getElementById(c[0]);
    var v = el.value + c[3];
    document.documentElement.style.setProperty(c[1], v);
    document.getElementById(c[2]).textContent = v;
  });
}

CTRLS.forEach(function(c){
  document.getElementById(c[0]).addEventListener('input', aplicar);
});

function gerarCss(){
  var get = function(id){return document.getElementById(id).value;};
  var out = '/* Cole em assets/css/main.css (substitua os blocos correspondentes) */\n\n';
  out += '.np-ranking-strip{display:grid;grid-template-columns:repeat('+get('cCols')+',1fr);gap:'+get('cGap')+'px;margin-bottom:20px;}\n';
  out += '@media(max-width:600px){.np-ranking-strip{grid-template-columns:1fr;}}\n\n';
  out += '.np-rank-card{\n';
  out += '  background:var(--surface);\n';
  out += '  border:1px solid var(--border2);\n';
  out += '  border-radius:'+get('cRad')+'px;\n';
  out += '  padding:'+get('cPadY')+'px '+get('cPadX')+'px;\n';
  out += '  display:flex;align-items:center;\n';
  out += '  gap:'+get('cCgap')+'px;\n';
  out += '}\n';
  out += '.np-rank-card:first-child{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.05);}\n';
  out += '.np-rank-card:nth-child(2){border-color:rgba(148,163,184,.3);}\n';
  out += '.np-rank-card:nth-child(3){border-color:rgba(180,120,60,.3);}\n\n';
  out += '.np-rank-pos{\n';
  out += '  font-size:'+get('cPos')+'px;\n';
  out += '  font-weight:900;color:var(--muted);\n';
  out += '  width:'+get('cPosW')+'px;\n';
  out += '  flex-shrink:0;text-align:center;\n';
  out += '}\n';
  out += '.np-rank-card:first-child .np-rank-pos{color:#fbbf24;}\n\n';
  out += '.np-rank-avatar{\n';
  out += '  width:'+get('cAva')+'px;height:'+get('cAva')+'px;\n';
  out += '  border-radius:50%;\n';
  out += '  display:flex;align-items:center;justify-content:center;\n';
  out += '  font-size:'+get('cAvaF')+'px;\n';
  out += '  font-weight:800;flex-shrink:0;\n';
  out += '}\n\n';
  out += '.np-rank-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:'+get('cGi')+'px;}\n';
  out += '.np-rank-nome{font-size:'+get('cNome')+'px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n';
  out += '.np-rank-val{font-size:'+get('cVal')+'px;font-weight:700;font-variant-numeric:tabular-nums;}\n';
  out += '.np-rank-val .pct{font-size:'+get('cPct')+'px;font-weight:700;margin-left:4px;}\n';
  out += '.np-rank-sub{font-size:'+get('cSub')+'px;color:var(--muted);}\n';
  return out;
}

document.getElementById('btnCss').addEventListener('click', function(){
  var css = gerarCss();
  var pre = document.getElementById('cssOut');
  pre.textContent = css;
  pre.classList.add('show');
  if(navigator.clipboard){
    navigator.clipboard.writeText(css).then(function(){
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 1700);
    });
  }
});

document.getElementById('btnReset').addEventListener('click', function(){
  var defaults = {cCols:3,cGap:12,cPadY:14,cPadX:16,cRad:10,cCgap:12,cPos:20,cPosW:24,cAva:32,cAvaF:13,cNome:13,cVal:12,cPct:9,cSub:9,cGi:0};
  Object.keys(defaults).forEach(function(k){
    document.getElementById(k).value = defaults[k];
  });
  aplicar();
  document.getElementById('cssOut').classList.remove('show');
});

render();
aplicar();
</script>
</body>
</html>
